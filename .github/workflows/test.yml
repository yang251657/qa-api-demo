# 自动化开关
name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test1, test2]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成对应环境的 .env 文件
        run: |
          echo "ENV=${{ matrix.environment }}" > .env.${{ matrix.environment }}
          echo "BASE_URL=https://reqres.in/api" >> .env.${{ matrix.environment }}
          if [ "${{ matrix.environment }}" = "test1" ]; then
            echo "API_KEY=${{ secrets.TEST1_API_KEY }}" >> .env.${{ matrix.environment }}
          else
            echo "API_KEY=${{ secrets.TEST2_API_KEY }}" >> .env.${{ matrix.environment }}
          fi

      - name: 运行测试并生成报告
        env:
          ENV: ${{ matrix.environment }}
        run: |
          pytest -v --html=reports/report-${{ matrix.environment }}.html --self-contained-html \
            --alluredir=allure-results-${{ matrix.environment }}

      - name: 上传pytest-html报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.environment }}
          path: reports/report-${{ matrix.environment }}.html

      - name: 上传Allure原始数据(供后续统一发布使用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.environment }}
          path: allure-results-${{ matrix.environment }}

  publish-allure-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载test1的Allure数据
        uses: actions/download-artifact@v4
        with:
          name: allure-results-test1
          path: allure-results-test1

      - name: 下载test2的Allure数据
        uses: actions/download-artifact@v4
        with:
          name: allure-results-test2
          path: allure-results-test2

      - name: 生成Allure可视化报告(合并两个环境)
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-test1
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: 发布Allure报告到GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history