name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# jobs:
#   test:
#     runs-on: ubuntu-latest


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test1, test2]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成对应环境的 .env 文件
        run: |
          echo "ENV=${{ matrix.environment }}" > .env.${{ matrix.environment }}
          echo "BASE_URL=https://reqres.in/api" >> .env.${{ matrix.environment }}
          if [ "${{ matrix.environment }}" = "test1" ]; then
            echo "API_KEY=${{ secrets.TEST1_API_KEY }}" >> .env.${{ matrix.environment }}
          else
            echo "API_KEY=${{ secrets.TEST2_API_KEY }}" >> .env.${{ matrix.environment }}
          fi
          echo "----- 生成的配置文件内容如下 -----"
          cat .env.${{ matrix.environment }}
      
    #   - name: 生成对应环境的 .env 文件
    #     run: |
    #       echo "ENV=${{ matrix.environment }}" >> .env.${{ matrix.environment }}
    #       echo "BASE_URL=https://reqres.in/api" >> .env.${{ matrix.environment }}
    #       echo "API_KEY=${{ matrix.environment == 'test1' && secrets.TEST1_API_KEY || secrets.TEST2_API_KEY }}" >> .env.${{ matrix.environment }}


    #   - name: 运行测试并生成报告
    #     env:
    #       API_KEY: ${{ secrets.API_KEY }}
    #     run: pytest -v --html=reports/report.html --self-contained-html

      - name: 运行测试并生成报告
        env:
          ENV: ${{ matrix.environment }}
        run: pytest -v --html=reports/report-${{ matrix.environment }}.html --self-contained-html

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.environment }}
          path: reports/report-${{ matrix.environment }}.html 
      
      - name: 生成Allure原始数据
        env:
          ENV: ${{ matrix.environment }}
        run: pytest -v --alluredir=allure-results-${{ matrix.environment }}

      - name: 生成Allure可视化报告
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results-${{ matrix.environment }}
          allure_report: allure-report-${{ matrix.environment }}
          allure_history: allure-history-${{ matrix.environment }}
          keep_reports: 20

      - name: 发布Allure报告到GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history-${{ matrix.environment }}
          destination_dir: ${{ matrix.environment }}

      # - name: 上传测试报告
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-report
      #     path: reports/report.html

