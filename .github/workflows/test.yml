name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# jobs:
#   test:
#     runs-on: ubuntu-latest


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test1, test2]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 生成对应环境的 .env 文件
        run: |
          echo "ENV=${{ matrix.environment }}" >> .env.${{ matrix.environment }}
          echo "BASE_URL=https://reqres.in/api" >> .env.${{ matrix.environment }}
          echo "API_KEY=${{ matrix.environment == 'test1' && secrets.TEST1_API_KEY || secrets.TEST2_API_KEY }}" >> .env.${{ matrix.environment }}

          
      - name: 运行测试并生成报告
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: pytest -v --html=reports/report.html --self-contained-html

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html

