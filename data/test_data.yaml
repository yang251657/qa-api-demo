cases:

  # ======================
  # LOGIN 模块
  # ======================

  - case_name: login_success
    module: login
    mark: smoke
    data:
      email: clouduser@test.com
      password: cloudpass123
    expected:
      status_code: 200

  - case_name: login_missing_password
    module: login
    mark: regression
    data:
      email: clouduser@test.com
      password: ""
    expected:
      status_code: 400


  # ======================
  # CUSTOMER 模块
  # ======================

  - case_name: create_customer_success
    module: customer
    mark: smoke
    data:
      name: Test Customer
      email: testcustomer2@example.com
      phone: "021-123-4567"
      company: Test Corp
    expected:
      status_code: 200

  - case_name: create_customer_missing_name
    module: customer
    mark: regression
    data:
      name: ""
      email: nocustomer@example.com
      phone: ""
      company: ""
    expected:
      status_code: 400