cases:

  # ======================
  # LOGIN 模块（2条）
  # ======================

  - case_name: login_success
    module: login
    mark: smoke
    data:
      email: eve.holt@reqres.in
      password: cityslicka
    expected:
      status_code: 200

  - case_name: login_missing_password
    module: login
    mark: regression
    data:
      email: eve.holt@reqres.in
      password: ""
    expected:
      status_code: 400


  # ======================
  # CUSTOMER 模块（2条）
  # ======================

  - case_name: get_existing_customer
    module: customer
    mark: regression
    data:
      customer_id: 2
    expected:
      status_code: 200


  - case_name: get_nonexistent_customer
    module: customer
    mark: regression
    data:
      customer_id: 9999
    expected:
      status_code: 404